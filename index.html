<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <link rel="stylesheet" href="css/index.css">
    <title>Cart</title>
</head>
<body>
    <div class="wrapper">

        <div class="content">
            <header class="header header--margin">
                <div class="nav">
                    <div class="nav__button nav__button--active">МОИ КАРТЫ</div>
                    <div class="nav__button">ДРУГИЕ КАРТЫ</div>
                </div>
            </header>
            <section class="cart cart--margin">
                <div class="cart__left">
                    <div class="cart__left-text">ЕДИНАЯ</div>

                </div>
                <div class="cart__right">
                    <div class="cart__container-top">
                        <div class="cart__text-cart">Карта 1</div>
                        <div class="cart__text-number">... 8547</div>
                    </div>
                    <div class="cart__container-bottom">
                        <div class="cart__text-price">12030,03 ₸</div>
                        <div class="cart__text-info">~150 поездки, Алматы </div>

                    </div>
                </div>

            </section>
            <section class="virtual-cart virtual-cart--margin">
                <a href="#" class="virtual-cart__button">
                    <img class="virtual-cart__img" src="image/img-index/ico-text.png" alt="">
                    <p class="virtual-cart__link">Добавить виртуальную карту</p>
                </a>
            </section>

            <section class="grid">
                <div class="grid__item">
                    <a href="#" class="grid__button">
                        <img class="grid__image" src="image/img-index/1.png" alt="">
                        <p class="grid__text">Пополнить</p>
                    </a>
                    <a href="#" class="grid__button">
                        <img class="grid__image" src="image/img-index/2.png" alt="">
                        <p class="grid__text">Перевести</p>
                    </a>
                    <a href="#" class="grid__button">
                        <img class="grid__image" src="image/img-index/3.png" alt="">
                        <p class="grid__text">История</p>
                    </a>
                    <a href="pay-with-cod.html" class="grid__button">
                        <img class="grid__image" src="image/img-index/4.png" alt="">
                        <p class="grid__text">Оплатить по<br>
                            коду</p>
                    </a>
                    <a href="#" class="grid__button">
                        <img class="grid__image" src="image/img-index/5.png" alt="">
                        <p class="grid__text">Оплатить по<br>
                            QR-коду</p>
                    </a>
                    <a href="my-ticket.html" class="grid__button">
                        <img class="grid__image" src="image/img-index/6.png" alt="">
                        <p class="grid__text">Мои билеты</p>
                    </a>
                    
                </div>
            </section>
        </div>

        <div class="footer">
            <div class="footer__nav">
                <div class="footer__button">
                    <img class="footer__img" src="image/img-index/nav.png" alt="">
                    <p class="footer__text">Маршруты</p>
                </div>
                <div class="footer__button">
                    <img class="footer__img" src="image/img-index/krug-active.png" alt="">
                    <p class="footer__text">Карты</p>
                </div>
                <div class="footer__button">
                    <img class="footer__img" src="image/img-index/bus.png" alt="">
                    <p class="footer__text">Платежи</p>
                </div>
                <div class="footer__button">
                    <img class="footer__img" src="image/img-index/user.png" alt="">
                    <p class="footer__text">Меню</p>
                </div>
            </div>

        </div>
      
    </div>
      


</body>
</html>
