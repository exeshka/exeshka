<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <link rel="stylesheet" href="css/pay-with-cod.css">
    
    <title>Document</title>
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <a href="index.html" class="nav">
                <img src="image/img-pay-with-cod/back.png" alt="" class="nav__img">
                <p class="nav__text">Оплатить по коду</p>
            </a>
        </header>
        <p class="pres-cart">Карта. с которой будут списаны деньги</p>
        <section class="cart cart--margin">

            <div class="cart__left">
                <div class="cart__left-text">ЕДИНАЯ</div>

            </div>
            <div class="cart__right">
                <div class="cart__container-top">
                    <div class="cart__text-cart">Карта 1</div>
                    <div class="cart__text-number">... 8547</div>
                </div>
                <div class="cart__container-bottom">
                    <div class="cart__text-price">120,00 ₸</div>
                    <div class="cart__text-info">~18 поездки, Алматы </div>

                </div>
            </div>
        </section>
        <form class="input">
            <div class="input__container">
                <div class="input__info">
                    <p class="input__text">Введите код*</p>
                    <input type="tel" class="input__inp" id="numberInput">
                </div>
                <button class="input__button" type="submit" id="submitButton">ОПЛАТИТЬ</button>
            </div>
        </form>
        <section class="info">
            <div class="info__container">
                <a href="" class="info__button">
                    <div class="info__button-con">
                        <p class="info__text">Как платить?</p>
                        <img src="image/img-pay-with-cod/INFO.png" alt="" class="info__img">
                    </div>
                </a>

                



            <p class="info__desc">*Код транспортного средства, товара или<br>
                услуги указан на терминале ONAY! либо на<br>
                кассе.</p>
            </div>
        </section>
    </div>
    <script src="js/pay-with-cod.js"></script>


    
</body>
</html>
